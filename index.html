<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header>
    <h1>Expense Tracker</h1>
    <div id="balance">Total: Rp 0</div>
    <button id="theme-toggle" aria-label="Toggle dark/light mode">🌙 Dark Mode</button>
  </header>

  <main>
    <section id="form-section">
      <h2>Add Expense</h2>
      <form id="transaction-form" novalidate>
        <input id="item-name" type="text" placeholder="Item name" autocomplete="off" />
        <input id="item-amount" type="number" placeholder="Amount" min="0.01" step="0.01" />
        <select id="item-category">
          <option value="">Select category</option>
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Fun">Fun</option>
        </select>
        <button type="submit">Add Transaction</button>
        <p id="error-msg" aria-live="polite"></p>
      </form>
    </section>

    <section id="chart-section">
      <h2>Spending by Category</h2>
      <canvas id="pie-chart"></canvas>
      <p id="empty-chart-msg">Add a transaction to see the chart.</p>
    </section>

    <section id="list-section">
      <h2>Transactions</h2>
      <div class="sort-controls" style="display: flex; gap: 10px; margin-bottom: 15px;">
        <button id="sort-btn">Sort by Amount ↓</button>
      </div>
      <ul id="transaction-list"></ul>
      <p id="empty-list-msg">No transactions yet.</p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
