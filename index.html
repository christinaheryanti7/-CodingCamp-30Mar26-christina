<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker Christin</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header>
    <h1>Expense Tracker</h1>
    <div id="balance">Total: Rp 0</div>
    <div id="budget-control">
      <label for="budget-input">Budget Limit (Rp)</label>
      <input id="budget-input" type="number" placeholder="e.g. 2000000" min="1" />
      <button id="budget-save-btn">Set</button>
    </div>
    <button id="theme-toggle" aria-label="Toggle dark/light mode">🌙 Dark Mode</button>
  </header>

  <div id="monthly-insights">
    <span id="insights-label">📅</span>
    <select id="month-filter" aria-label="Filter by month">
      <option value="">All Months</option>
      <option value="0">January</option>
      <option value="1">February</option>
      <option value="2">March</option>
      <option value="3">April</option>
      <option value="4">May</option>
      <option value="5">June</option>
      <option value="6">July</option>
      <option value="7">August</option>
      <option value="8">September</option>
      <option value="9">October</option>
      <option value="10">November</option>
      <option value="11">December</option>
    </select>
    <span id="insights-total">Rp 0</span>
    <span id="insights-count">0 transactions</span>
  </div>

  <main>
    <section id="form-section">
      <h2>Add Expense</h2>
      <form id="transaction-form" novalidate>
        <input id="item-name" type="text" placeholder="Item name" autocomplete="off" />
        <input id="item-amount" type="number" placeholder="Amount" min="0.01" step="0.01" />
        <select id="item-category">
          <option value="">Select category</option>
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Fun">Fun</option>
        </select>
        <button type="submit">Add Transaction</button>
        <p id="error-msg" aria-live="polite"></p>
      </form>

      <div id="custom-category-section">
        <h3>Custom Categories</h3>
        <div id="custom-category-form">
          <input id="new-category-input" type="text" placeholder="New category name" autocomplete="off" />
          <button id="add-category-btn">Add</button>
        </div>
        <div id="custom-category-tags"></div>
      </div>
    </section>

    <section id="chart-section">
      <h2>Spending by Category</h2>
      <canvas id="pie-chart"></canvas>
      <p id="empty-chart-msg">Add a transaction to see the chart.</p>
    </section>

    <section id="list-section">
      <h2>Transactions</h2>
      <div id="list-controls">
        <select id="filter-category">
          <option value="">All Categories</option>
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Fun">Fun</option>
        </select>
        <button id="sort-btn">Sort by Amount ↓</button>
      </div>
      <ul id="transaction-list"></ul>
      <p id="empty-list-msg">No transactions yet.</p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
